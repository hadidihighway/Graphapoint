<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graphapoint - Graph</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Graphapoint</h1>
      <p>Plotted point: ({{ x }}, {{ y }})</p>
      <canvas id="graph" width="600" height="600"></canvas>
      <div class="buttons">
        <a class="button" href="/">Back</a>
      </div>
    </main>

    <script>
      const point = { x: {{ x }}, y: {{ y }} };

      const width = 600;
      const height = 600;
      const spacing = 25;

      const canvas = document.getElementById('graph');
      const ctx = canvas.getContext('2d');

      const cx = width / 2;
      const cy = height / 2;

      function drawGrid() {
        ctx.clearRect(0, 0, width, height);
        ctx.lineWidth = 1;
        for (let x = 0; x <= width; x += spacing) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.strokeStyle = 'lightgray';
          ctx.stroke();
        }
        for (let y = 0; y <= height; y += spacing) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.strokeStyle = 'lightgray';
          ctx.stroke();
        }
        // axes
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(width, cy); ctx.stroke();
      }

      function toCanvas(x, y) {
        const canvasX = cx + x * spacing;
        const canvasY = cy - y * spacing;
        return { x: canvasX, y: canvasY };
      }

      function drawPoint(p) {
        const c = toCanvas(p.x, p.y);
        ctx.beginPath();
        ctx.fillStyle = 'red';
        ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawLine(p) {

        const b = p.y - p.x;
        const unitsX = Math.floor(width / spacing);
        const half = Math.floor(unitsX / 2);
        const x1 = -half;
        const x2 = half;
        const y1 = x1 + b;
        const y2 = x2 + b;
        const c1 = toCanvas(x1, y1);
        const c2 = toCanvas(x2, y2);
        ctx.beginPath();
        ctx.strokeStyle = 'blue';
        ctx.lineWidth = 2;
        ctx.moveTo(c1.x, c1.y);
        ctx.lineTo(c2.x, c2.y);
        ctx.stroke();
      }

      drawGrid();
      drawPoint(point);
      drawLine(point);
    </script>
  </body>
</html>
